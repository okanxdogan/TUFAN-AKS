; PlatformIO Project Configuration File
;
; default_envs limits 'platformio run' (IDE build button) to esp32dev only.
; Native tests are run separately via 'pio test -e native'.
[platformio]
default_envs = esp32dev
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32@6.13.0
board = esp32dev
framework = espidf
monitor_speed = 115200
build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -I include
    -I src
test_ignore = test_native_*

[env:esp32dev_diag]
; Geçici E22 tanı ortamı — modülün mevcut register bloğunu SADECE OKUR.
; Kullanim: pio run -e esp32dev_diag --target upload
; Tani bittikten sonra: pio run -e esp32dev --target upload (normal firmware)
; Not: ESP-IDF framework'te build_src_filter güvenilir çalışmadığından tam
; esp32dev yapısını devralıp sadece flag ekliyoruz; main.cpp'deki app_main
; #ifndef guard'ı ile devre dışı kalır, e22_diagnostic.cpp'deki app_main aktif olur.
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -D E22_DIAGNOSTIC_MODE

[env:native]
platform = native
test_framework = unity
build_src_filter = -<*>
build_flags =
    -std=gnu++17
    -I include
    -I src
    -I lib/CanManager
    -I lib/Telemetry
    -I lib/VehicleData
    -I lib/VcuLogic
    -I lib/DisplayHMI
    -I lib/RelayManager
    -I lib/BmsModel
    -I lib/BmsAlgo
    -I lib/OfflineBuffer
    -I lib/E22Config
    -I test/support/idf_stubs
    -I test/support
    -D NATIVE_BUILD
test_filter = test_native_*
lib_ignore =
    CanManager
    Telemetry
    DisplayHMI
    RelayManager
    BmsAlgo
    VcuLogic
